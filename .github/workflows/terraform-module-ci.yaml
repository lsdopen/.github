# Terraform Module — Continuous Integration
#
# Reusable workflow for all Terraform modules. Called by each module's ci.yml.
#
# Steps:
#   1. Detects minimum Terraform version from versions.tf (uses the lowest allowed)
#   2. Auto-formats code with `terraform fmt -recursive`
#      - If changes are needed, commits the fix with [skip ci] and continues
#   3. Validates syntax with `terraform init` + `terraform validate`
#   4. Lints with tflint using shared config from .github/terraform/tflint.hcl
#
# Overrides:
#   - Place a .tflint.hcl in your module repo root to use custom lint rules
#   - The shared config is only downloaded if no local .tflint.hcl exists
name: 'Continuous Integration'

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Agent selection string.'
        required: false
        default: 'ubuntu-latest'
        type: string

permissions:
  contents: write

jobs:
  continuous-integration:
    name: 'Continuous Integration'
    runs-on: ${{ inputs.runs-on }}
    env:
      TF_IN_AUTOMATION: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Detect minimum Terraform version
        id: tf-version
        run: |
          version=$(grep -h required_version *.tf | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "::notice::Using Terraform $version (minimum from versions.tf)"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.tf-version.outputs.version }}

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Commit formatting fixes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "fmt-bot"
            git config user.email "actions@github.com"
            git add -A
            git commit -m "chore: terraform format [skip ci]"
            git push
          fi

      - name: Check Terraform Syntax
        run: terraform init -backend=false && terraform validate

      - name: Install TFLint
        run: |
          curl -sSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Fetch shared tflint config
        run: |
          if [ ! -f .tflint.hcl ]; then
            curl -sL https://raw.githubusercontent.com/lsdopen/.github/main/.github/terraform/tflint.hcl -o .tflint.hcl
          fi

      - name: Check Terraform Lint
        run: tflint --init && tflint -f compact
        env:
          GITHUB_TOKEN: ${{ github.token }}
